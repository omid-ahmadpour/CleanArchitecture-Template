name: CD

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        run: |
          project_file="src/Web/Api/CleanTemplate.Api.csproj"
          version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' "$project_file" | head -n 1)"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid or missing <Version> in $project_file. Expected format: X.Y.Z"
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" != "v$version" && "$GITHUB_REF_NAME" != "V$version" ]]; then
            echo "Release tag '$GITHUB_REF_NAME' must match $project_file <Version> value '$version' as v$version or V$version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_title=V $version" >> "$GITHUB_OUTPUT"

      - name: Validate publish secrets
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "Repository secret NUGET_API_KEY is required to publish to nuget.org."
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore CleanTemplate.sln

      - name: Build
        run: dotnet build CleanTemplate.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CleanTemplate.sln --configuration Release --no-build --verbosity normal

      - name: Pack template
        run: dotnet pack Package.nuspec --configuration Release --output artifacts/packages --version "${{ steps.version.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ASPNETCleanTemplate.nuspec-${{ steps.version.outputs.version }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Build GitHub release notes
        run: |
          release_notes="$(sed -n 's:.*<releaseNotes>\(.*\)</releaseNotes>.*:\1:p' Package.nuspec | head -n 1)"
          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_SHA^" 2>/dev/null || true)"

          if [ -z "$release_notes" ]; then
            release_notes="Release ${{ steps.version.outputs.version }}"
          fi

          {
            echo "## What's Changed"
            echo "$release_notes"
            echo "Improved and tidied up the overall code"
            echo

            if [ -n "$previous_tag" ]; then
              echo "Full Changelog: [$previous_tag...$GITHUB_REF_NAME](https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${GITHUB_REF_NAME})"
              echo
            fi

            echo "Corresponding Nuget Package: [https://www.nuget.org/packages/ASPNETCleanTemplate.nuspec/](https://www.nuget.org/packages/ASPNETCleanTemplate.nuspec/)"
          } > release-notes.md

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "${{ steps.version.outputs.release_title }}" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" artifacts/packages/*.nupkg --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/packages/*.nupkg \
              --title "${{ steps.version.outputs.release_title }}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text

          dotnet nuget push artifacts/packages/*.nupkg \
            --source github \
            --api-key "$GITHUB_TOKEN" \
            --skip-duplicate

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/packages/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
